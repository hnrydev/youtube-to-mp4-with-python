# Nixpacks (Dokploy)
#
# Do NOT add `python3 -m pip install` here: the Nix `python3` in PATH has no pip
# (build fails: "No module named pip"). Nixpacks' `python:install` phase creates
# `/opt/venv` and runs `pip install -r requirements.txt` there.
#
# [phases.install] is only `...` so we keep the Node `npm ci` (and any other
# merged install steps) without a duplicate broken pip on the Nix python.

providers = ["...", "python"]

[variables]
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"

[phases.install]
cmds = ["..."]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

# uvicorn is installed in /opt/venv; ensure that bin dir is on PATH
[start]
cmd = "sh -c 'export PATH=/opt/venv/bin:$PATH && exec uvicorn server:app --host 0.0.0.0 --port ${PORT:-3000}'"
